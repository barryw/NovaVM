# NovaZ runtime ROM.
# Produces a 16K image mapped at $C000-$FFFF with CPU vectors at $FFFA.

MEMORY {
    ZP:      start = $0040, size = $C0,   type = rw;
    RAM:     start = $0300, size = $BD00, type = rw;
    ROM:     start = $C000, size = $3FFA, fill = yes, fillval = $EA;
    VECTORS: start = $FFFA, size = $0006, fill = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    CODE:     load = ROM,     type = ro;
    RODATA:   load = ROM,     type = ro;
    BSS:      load = RAM,     type = bss, define = yes;
    VECTORS:  load = VECTORS, type = ro;
}
