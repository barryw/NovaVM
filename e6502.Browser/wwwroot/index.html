<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova VM — 6502 Emulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #header {
            text-align: center;
            padding: 12px 0 8px 0;
        }

        #header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #8cf;
            letter-spacing: 0.05em;
        }

        #header p {
            font-size: 0.75rem;
            color: #666;
            margin-top: 2px;
        }

        #screen-container {
            position: relative;
            width: 640px;
            height: 400px;
            border: 2px solid #333;
            border-radius: 4px;
            background: #000;
        }

        #screen {
            display: block;
            width: 640px;
            height: 400px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* Avalonia's #out div — hidden, exists only for keyboard focus */
        #out {
            width: 1px;
            height: 1px;
            position: absolute;
            left: -9999px;
            overflow: hidden;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #8cf;
            font-size: 0.9rem;
            z-index: 10;
        }

        #loading .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top-color: #8cf;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #audio-prompt {
            display: none;
            position: fixed;
            bottom: 24px;
            background: #1a1a2e;
            color: #8cf;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid #333;
            z-index: 100;
            transition: opacity 0.3s;
        }

        #audio-prompt:hover {
            background: #252545;
        }

        #footer {
            text-align: center;
            padding: 8px 0;
            font-size: 0.7rem;
            color: #444;
        }

        #footer a {
            color: #68a;
            text-decoration: none;
        }

        #footer a:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>
    <div id="header">
        <h1>Nova VM</h1>
        <p>MOS 6502 Emulator &mdash; running in your browser via WebAssembly</p>
    </div>

    <div id="screen-container">
        <canvas id="screen" width="640" height="400"></canvas>
        <div id="loading">
            <span class="spinner"></span>Loading Nova VM...
        </div>
    </div>

    <!-- Avalonia mount point — invisible, used only for keyboard focus -->
    <div id="out"></div>

    <div id="audio-prompt" onclick="enableAudio()">
        Click here or press any key to enable audio
    </div>

    <div id="footer">
        <a href="https://barrywalker.io">barrywalker.io</a> &mdash;
        Built with .NET + Avalonia + WebAssembly
    </div>

    <script>
        let audioEnabled = false;

        function enableAudio() {
            if (audioEnabled) return;
            audioEnabled = true;
            document.getElementById('audio-prompt').style.display = 'none';

            if (globalThis.novaAudio) {
                globalThis.novaAudio.init(44100);
            }
        }

        // Enable audio on first keypress or click
        document.addEventListener('keydown', enableAudio, { once: true });
        document.addEventListener('click', enableAudio, { once: true });
    </script>
    <!-- main.js bootstraps .NET WASM runtime + Avalonia + audio bridge + canvas renderer -->
    <script type="module" src="./main.js"></script>
</body>
</html>
